  <h1>投稿者に連絡する</h1>
  <form id="contactForm">
    <input name="action" type="hidden" value="submitInquiry">
    <input name="post_id" id="post_id" type="hidden">
    <label>あなたの名前</label><input name="sender_name" required>
    <label>あなたのメール</label><input name="sender_email" type="email" required>
    <label>件名</label><input name="subject" required>
    <label>メッセージ</label><textarea name="message" required></textarea>
    <button type="submit">送信する</button>
  </form>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';
    document.getElementById('post_id').value = new URLSearchParams(location.search).get('post_id') || '';
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch(GAS_URL, { method:'POST', body: fd });
      const data = await res.json();
      if (data.ok) location.href = './thanks.html';
      else alert('送信に失敗しました');
    });
  </script>
